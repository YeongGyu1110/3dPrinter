<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D프린터운용기능사 실전 모의고사</title>
    <style>
        /* --- CSS 변수 (라이트 모드 기본 설정) --- */
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --correct-color: #10B981;
            --correct-text: #065F46;
            --correct-bg: #D1FAE5;
            --wrong-color: #EF4444;
            --wrong-text: #991B1B;
            --wrong-bg: #FEE2E2;
            --border-color: #E5E7EB;
            --explanation-bg: #F8FAFC;
            --score-bg: #EEF2FF;
            --choice-hover-bg: #EEF2FF;
        }

        /* --- CSS 변수 (다크 모드 설정) --- */
        body.dark-mode {
            --primary-color: #6366f1;
            /* 눈이 편안한 약간 밝은 인디고 */
            --primary-hover: #818cf8;
            --bg-color: #121212;
            /* 완전한 블랙이 아닌 다크 그레이 */
            --card-bg: #1e1e1e;
            /* 카드 배경색 */
            --text-main: #e0e0e0;
            /* 부드러운 밝은 회색 */
            --text-muted: #a1a1aa;
            --correct-color: #34d399;
            /* 채도를 낮춘 파스텔톤 그린 */
            --correct-text: #34d399;
            --correct-bg: rgba(16, 185, 129, 0.15);
            /* 반투명 배경 */
            --wrong-color: #f87171;
            /* 채도를 낮춘 파스텔톤 레드 */
            --wrong-text: #f87171;
            --wrong-bg: rgba(239, 68, 68, 0.15);
            --border-color: #333333;
            --explanation-bg: rgba(255, 255, 255, 0.05);
            --score-bg: rgba(99, 102, 241, 0.1);
            --choice-hover-bg: rgba(99, 102, 241, 0.1);
        }

        /* 기본 리셋 및 폰트 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        }

        /* 부드러운 전환 효과 적용 */
        body,
        .container,
        .choice-btn,
        .explanation-box,
        .score-circle,
        h1,
        h2,
        p,
        span,
        div {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- 다크모드 토글 버튼 --- */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.05);
        }

        /* 공통 컨테이너 */
        .container {
            width: 100%;
            max-width: 700px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-top: 40px;
            /* 토글 버튼 공간 확보 */
        }

        .screen {
            padding: 40px;
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        /* --- 상태 화면 (로딩, 에러) --- */
        .status-content {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--score-bg);
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-box {
            background-color: var(--wrong-bg);
            border: 1px solid var(--wrong-color);
            color: var(--wrong-color);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
            line-height: 1.6;
        }

        /* --- 퀴즈 화면 --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .progress {
            font-weight: 600;
            color: var(--primary-color);
        }

        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-color);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .choices-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .choice-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
        }

        .choice-btn:not(:disabled):hover {
            border-color: var(--primary-color);
            background-color: var(--choice-hover-bg);
        }

        .choice-btn.correct {
            border-color: var(--correct-color);
            background-color: var(--correct-bg);
            color: var(--correct-text);
            font-weight: bold;
        }

        .choice-btn.wrong {
            border-color: var(--wrong-color);
            background-color: var(--wrong-bg);
            color: var(--wrong-text);
            text-decoration: line-through;
        }

        .explanation-box {
            background-color: var(--explanation-bg);
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
        }

        .action-area {
            display: none;
            margin-top: 20px;
        }

        /* --- 결과 화면 --- */
        .result-content {
            text-align: center;
            padding: 20px 0;
        }

        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: var(--score-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            border: 8px solid var(--primary-color);
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 2px;
        }

        .pass-text {
            color: var(--correct-color);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .fail-text {
            color: var(--wrong-color);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .theme-toggle-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .container {
                margin-top: 50px;
            }

            .screen {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.3rem;
            }

            h2 {
                font-size: 1.1rem;
            }

            .choice-btn {
                padding: 12px;
                font-size: 0.95rem;
            }

            .score-circle {
                width: 150px;
                height: 150px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <!-- 다크모드 토글 버튼 -->
    <button id="themeToggle" class="theme-toggle-btn" title="다크 모드 전환">🌙</button>

    <div class="container">

        <!-- 1. 로딩 화면 -->
        <div id="screen-loading" class="screen active">
            <div class="status-content">
                <div class="spinner"></div>
                <h2 style="color: var(--text-muted);">문제 데이터를 불러오는 중입니다...</h2>
            </div>
        </div>

        <!-- 2. 에러 화면 -->
        <div id="screen-error" class="screen">
            <div class="status-content">
                <h1>⚠️ 오류 발생</h1>
                <div class="error-box" id="errorText">
                    data.json 파일을 불러오지 못했습니다.<br><br>
                    VS Code의 Live Server 같은 로컬 웹 서버 환경에서 실행해 주세요.
                </div>
            </div>
        </div>

        <!-- 3. 퀴즈 화면 -->
        <div id="screen-quiz" class="screen">
            <div class="quiz-header">
                <div class="progress" id="progressText">문제 1 / 60</div>
                <div class="toggle-wrapper">
                    해설 같이 보기
                    <label class="switch">
                        <input type="checkbox" id="toggleExplanation">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <h2 id="questionText">문제 내용이 여기에 표시됩니다.</h2>

            <div class="choices-grid" id="choicesBox"></div>

            <div id="explanationBox" class="explanation-box">
                <strong>💡 해설:</strong> <span id="explanationText"></span>
            </div>

            <div id="actionArea" class="action-area">
                <button class="btn" id="nextBtn">다음 문제</button>
            </div>
        </div>

        <!-- 4. 결과 화면 -->
        <div id="screen-result" class="screen">
            <h1>📊 모의고사 최종 결과</h1>
            <div class="result-content">
                <div class="score-circle" id="finalScore">0 / 60</div>

                <!-- 합격 / 불합격 판정 텍스트 -->
                <div id="passFailText" class="pass-text"></div>

                <p style="margin-bottom:30px; font-size:1rem; color:var(--text-muted);" id="resultText"></p>

                <!-- 다시 풀기 버튼 -->
                <button class="btn" id="restartBtn">새로운 모의고사 시작 🔄</button>
            </div>
        </div>

    </div>

    <script>
        // --- 다크모드 관리 로직 ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        // Local Storage에서 이전 테마 설정 불러오기
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeToggleBtn.textContent = '☀️';
        }

        // 토글 버튼 클릭 이벤트
        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');

            // 아이콘 변경
            themeToggleBtn.textContent = isDark ? '☀️' : '🌙';

            // 브라우저에 테마 상태 저장
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });


        // --- 모의고사 핵심 로직 ---
        let allQuizData = [];
        let currentQuizData = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        const screenLoading = document.getElementById('screen-loading');
        const screenError = document.getElementById('screen-error');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const progressText = document.getElementById('progressText');
        const questionText = document.getElementById('questionText');
        const choicesBox = document.getElementById('choicesBox');
        const toggleExplanation = document.getElementById('toggleExplanation');
        const explanationBox = document.getElementById('explanationBox');
        const explanationText = document.getElementById('explanationText');
        const actionArea = document.getElementById('actionArea');
        const nextBtn = document.getElementById('nextBtn');

        const finalScore = document.getElementById('finalScore');
        const passFailText = document.getElementById('passFailText');
        const resultText = document.getElementById('resultText');
        const restartBtn = document.getElementById('restartBtn');

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function switchScreen(screenElement) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            screenElement.classList.add('active');
        }

        async function initQuiz() {
            try {
                const response = await fetch('data.json');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error("데이터 배열이 비어있거나 형식이 올바르지 않습니다.");
                }

                allQuizData = data;
                startNewMockTest();

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                switchScreen(screenError);
            }
        }

        function startNewMockTest() {
            const shuffledAll = shuffleArray(allQuizData);
            currentQuizData = shuffledAll.slice(0, 60);

            currentIndex = 0;
            score = 0;

            switchScreen(screenQuiz);
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            actionArea.style.display = 'none';

            explanationBox.style.display = toggleExplanation.checked ? 'block' : 'none';

            const qData = currentQuizData[currentIndex];

            progressText.textContent = `문제 ${currentIndex + 1} / ${currentQuizData.length}`;
            questionText.textContent = qData.question;
            explanationText.textContent = qData.explanation;

            const mappedChoices = qData.choices.map((text, idx) => ({
                text: text,
                isCorrect: (idx === qData.answer - 1)
            }));

            const shuffledChoices = shuffleArray(mappedChoices);

            choicesBox.innerHTML = '';
            shuffledChoices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = `${index + 1}. ${choice.text}`;

                btn.dataset.correct = choice.isCorrect;

                btn.addEventListener('click', () => handleAnswer(btn));
                choicesBox.appendChild(btn);
            });

            if (currentIndex === currentQuizData.length - 1) {
                nextBtn.textContent = "결과 보기 📊";
            } else {
                nextBtn.textContent = "다음 문제 ➡️";
            }
        }

        function handleAnswer(selectedBtn) {
            if (isAnswered) return;
            isAnswered = true;

            const allBtns = choicesBox.querySelectorAll('.choice-btn');
            allBtns.forEach(btn => btn.disabled = true);

            const isCorrect = selectedBtn.dataset.correct === 'true';

            if (isCorrect) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                allBtns.forEach(btn => {
                    if (btn.dataset.correct === 'true') {
                        btn.classList.add('correct');
                    }
                });
            }

            actionArea.style.display = 'block';
        }

        toggleExplanation.addEventListener('change', (e) => {
            if (screenQuiz.classList.contains('active')) {
                explanationBox.style.display = e.target.checked ? 'block' : 'none';
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < currentQuizData.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        });

        function showResult() {
            switchScreen(screenResult);

            const totalQuestions = currentQuizData.length;
            const passThreshold = Math.ceil(totalQuestions * 0.6);

            finalScore.textContent = `${score} / ${totalQuestions}`;
            resultText.textContent = `총 ${totalQuestions}문제 중 ${score}문제를 맞히셨습니다. (합격 기준: ${passThreshold}개 이상)`;

            if (score >= passThreshold) {
                finalScore.style.borderColor = "var(--correct-color)";
                finalScore.style.color = "var(--correct-color)";

                passFailText.textContent = "🎉 합격입니다!";
                passFailText.className = "pass-text";
            } else {
                finalScore.style.borderColor = "var(--wrong-color)";
                finalScore.style.color = "var(--wrong-color)";

                passFailText.textContent = "😢 불합격입니다. 조금 더 노력해 보세요!";
                passFailText.className = "fail-text";
            }
        }

        restartBtn.addEventListener('click', () => {
            finalScore.style.borderColor = "var(--primary-color)";
            finalScore.style.color = "var(--primary-color)";

            startNewMockTest();
        });

        // 스크립트 로드 완료 시 즉시 실행
        window.addEventListener('DOMContentLoaded', initQuiz);

    </script>
</body>

</html>
